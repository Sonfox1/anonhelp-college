{% extends 'base.html' %}{% block title %}Регистрация — AnonHelp{% endblock %}{% block content %}<section class="auth-layout"><form class="auth-card auth-wide reveal" method="post"><span class="badge">Новый аккаунт студента</span><h1>Регистрация</h1><p class="muted">Создайте аккаунт для подачи и отслеживания обращений. Личные данные не показываются администрации как автор обращения.</p><div class="two-col"><label>ФИО<input name="full_name" placeholder="Например: Иванов Иван" required></label><label>Логин<input name="username" placeholder="Придумайте логин" required></label><label>Email<input name="email" type="email" placeholder="student@example.com"></label><label>Группа<input name="group_name" placeholder="Например: ИС-22"></label><label>Пароль<input name="password" type="password" placeholder="Не менее 6 символов" required></label><label>Подтверждение пароля<input name="confirm_password" type="password" placeholder="Повторите пароль" required></label></div><button class="btn btn-primary full" type="submit">Зарегистрироваться</button><p class="small-note">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p></form></section>{% endblock %}
